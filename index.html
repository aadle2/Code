function initTenants() {
  const list = [];
  let id = 1;
  // RDC: 2 apparts
  for (let a = 1; a <= 2; a++) {
    list.push({ id: id++, name:"", firstname:"", phone:"", apt:`RDC-0${a}`, floor:"0", priorCredit:0 });
  }
  // Étages 1 à 9: 4 apparts chacun
  for (let f = 1; f <= 9; f++) {
    for (let a = 1; a <= 4; a++) {
      list.push({ id: id++, name:"", firstname:"", phone:"", apt:`${FLOORS[f]}-0${a}`, floor:String(f), priorCredit:0 });
    }
  }
  return list; // 2 + 36 = 38 locataires
}

async function loadDB() {
  const [t, p, d, v, a] = await Promise.all([
    supabase.from("tenants").select("*").order("id"),
    supabase.from("payments").select("*").order("id"),
    supabase.from("depenses").select("*").order("id", {ascending:false}),
    supabase.from("votes").select("*").order("id"),
    supabase.from("annonces").select("*").order("id", {ascending:false}),
  ]);
  return { tenants:t.data||[], payments:p.data||[], depenses:d.data||[], votes:v.data||[], annonces:a.data||[] };
}

// ─── COLORS ───────────────────────────────────────────────────────────────────
const C = {
  bg:"#0f172a", card:"#1e293b", border:"#334155",
  accent:"#38bdf8", accent2:"#818cf8",
  text:"#f1f5f9", sub:"#94a3b8",

const cardStyle = { background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:16, marginBottom:12 };

const btnStyle = (color="#334155", textColor=C.text) => ({ background:color, border:"none", color:textColor, borderRadius:6, padding:"7px 14px", cursor:"pointer", fontWeight:600, fontSize:13 });

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ tenants, payments, depenses, votes, annonces }) {
  const totalPaid = payments.reduce((s,p)=>s+Number(p.amount),0) + tenants.reduce((s,t)=>s+Number(t.priorCredit||0),0);
  const totalSpent = depenses.reduce((s,d)=>s+Number(d.amount),0);
  const caisse = totalPaid - totalSpent;
  const openVotes = votes.filter(v=>!v.closed).length;
  const lastAnnonce = annonces[0];

  // Locataires à jour = ceux dont solde >= 0
  const paidCount = tenants.filter(ten => {
    const paid = payments.filter(p=>p.tenantId===ten.id).reduce((s,p)=>s+Number(p.amount),0) + Number(ten.priorCredit||0);
    const due = payments.filter(p=>p.tenantId===ten.id).length > 0 ? 0 : 0; // basé sur paiements réels
    return paid > 0;
  }).length;

  const stats = [
    { label:"Total encaissé", value:`${totalPaid.toLocaleString()} DA`, color:C.green, icon:"💵" },
    { label:"Total dépensé", value:`${totalSpent.toLocaleString()} DA`, color:C.amber, icon:"🛒" },
    { label:"💰 Solde caisse", value:`${caisse.toLocaleString()} DA`, color:caisse>=0?C.green:C.red, icon:"🏦", big:true },
    { label:"Locataires (ont payé)", value:`${paidCount} / ${tenants.length}`, color:C.green, icon:"✅" },
    { label:"Votes en cours", value:`${openVotes}`, color:C.accent2, icon:"🗳️" },
  ];

  return (
    <div>
      <h2 style={{ color:C.text, marginBottom:16 }}>📊 Vue d'ensemble</h2>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(160px,1fr))", gap:10, marginBottom:16 }}>
        {stats.map((s,i)=>(
          <div key={i} style={{ ...cardStyle, margin:0, borderLeft:`4px solid ${s.color}`, padding:14 }}>
            <div style={{ fontSize:20, marginBottom:4 }}>{s.icon}</div>
            <div style={{ fontSize:s.big?22:18, fontWeight:800, color:s.color }}>{s.value}</div>
            <div style={{ fontSize:11, color:C.sub, marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {lastAnnonce && (
        <div style={{ ...cardStyle, borderLeft:`4px solid ${lastAnnonce.urgent?C.red:C.accent}` }}>
          <div style={{ display:"flex", gap:8, alignItems:"center", marginBottom:6, flexWrap:"wrap" }}>
            <span style={{ fontSize:16 }}>📢</span>
            <span style={{ fontWeight:700, color:C.text }}>Dernière annonce</span>
            {lastAnnonce.urgent && <span style={{ background:C.red, color:"#fff", borderRadius:4, padding:"1px 8px", fontSize:11, fontWeight:700 }}>⚡ URGENT</span>}
          </div>
          <div style={{ fontWeight:600, color:C.text }}>{lastAnnonce.title}</div>
          <div style={{ color:C.sub, fontSize:13, marginTop:4 }}>{lastAnnonce.message}</div>
        </div>
      )}
    </div>
  );
}

// ─── TENANTS ──────────────────────────────────────────────────────────────────
function Tenants({ tenants, payments, isAdmin, onAdd, onUpdate, onDelete }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name:"", firstname:"", phone:"", apt:"", floor:"0", priorCredit:0 });

  function startAdd() { setForm({ name:"", firstname:"", phone:"", apt:"", floor:"0", priorCredit:0 }); setAdding(true); setEditing(null); }
  function startEdit(ten) { setForm({...ten}); setEditing(ten.id); setAdding(false); }
  async function saveAdd() { if (!form.apt.trim()) return; await onAdd({...form, priorCredit:Number(form.priorCredit)||0}); setAdding(false); }
  async function saveEdit() { await onUpdate(editing, {...form, priorCredit:Number(form.priorCredit)||0}); setEditing(null); }
  async function del(id) { if(window.confirm("Supprimer ce locataire ?")) await onDelete(id); }

  // Calcul solde par locataire
  function getSolde(ten) {
    const paid = payments.filter(p=>p.tenantId===ten.id).reduce((s,p)=>s+Number(p.amount),0) + Number(ten.priorCredit||0);
    // Total dû = sum des montants dus enregistrés (on utilise les paiements comme référence)
    return paid;
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>👥 Locataires ({tenants.length})</h2>
        {isAdmin && <button onClick={startAdd} style={btnStyle(C.accent,"#0f172a")}>+ Ajouter</button>}
      </div>

      {(adding || editing) && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div><label style={{ fontSize:11, color:C.sub }}>Nom</label><input style={inputStyle} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Prénom</label><input style={inputStyle} value={form.firstname} onChange={e=>setForm(f=>({...f,firstname:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Téléphone</label><input style={inputStyle} value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Appartement</label><input style={inputStyle} value={form.apt} onChange={e=>setForm(f=>({...f,apt:e.target.value}))} /></div>
            <div>
              <label style={{ fontSize:11, color:C.sub }}>Étage</label>
              <select style={inputStyle} value={form.floor} onChange={e=>setForm(f=>({...f,floor:e.target.value}))}>
                {FLOORS.map((fl,i)=><option key={i} value={String(i)}>{fl}</option>)}
              </select>
            </div>
            <div><label style={{ fontSize:11, color:C.sub }}>Crédit antérieur (DA)</label><input type="number" style={inputStyle} value={form.priorCredit} onChange={e=>setForm(f=>({...f,priorCredit:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={adding?saveAdd:saveEdit} style={btnStyle(C.green,"#fff")}>💾 Enregistrer</button>
            <button onClick={()=>{setAdding(false);setEditing(null)}} style={btnStyle()}>Annuler</button>
          </div>
        </div>
      )}

      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
          <thead>
            <tr style={{ background:"#334155" }}>
              {["Apt","Étage","Nom","Prénom","Téléphone","Crédit ant.","Total payé", isAdmin&&"Actions"].filter(Boolean).map((h,i)=>(
                <th key={i} style={{ padding:"9px 10px", color:C.sub, textAlign:"left", borderBottom:`1px solid #475569`, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {tenants.map(ten=>{
              const totalPaid = payments.filter(p=>p.tenantId===ten.id).reduce((s,p)=>s+Number(p.amount),0);
              const total = totalPaid + Number(ten.priorCredit||0);
              return (
                <tr key={ten.id} style={{ borderBottom:`1px solid #1e293b` }}>
                  <td style={{ padding:"8px 10px", color:C.accent, fontWeight:700 }}>{ten.apt}</td>
                  <td style={{ padding:"8px 10px", color:C.sub }}>{FLOORS[Number(ten.floor)]}</td>
                  <td style={{ padding:"8px 10px", color:C.text }}>{ten.name||"—"}</td>
                  <td style={{ padding:"8px 10px", color:C.sub }}>{ten.firstname||"—"}</td>
                  <td style={{ padding:"8px 10px", color:C.sub }}>{ten.phone||"—"}</td>
                  <td style={{ padding:"8px 10px", color:Number(ten.priorCredit)>0?C.green:C.sub }}>{Number(ten.priorCredit||0).toLocaleString()}</td>
                  <td style={{ padding:"8px 10px", color:total>0?C.green:C.sub, fontWeight:700 }}>{total.toLocaleString()} DA</td>
                  {isAdmin && <td style={{ padding:"8px 10px", whiteSpace:"nowrap" }}>
                    <button onClick={()=>startEdit(ten)} style={{ ...btnStyle(), padding:"3px 8px", marginRight:4, fontSize:11 }}>✏️</button>
                    <button onClick={()=>del(ten.id)} style={{ ...btnStyle("#7f1d1d","#fca5a5"), padding:"3px 8px", fontSize:11 }}>🗑️</button>
                  </td>}
                </tr>
              );
            })}
          </tbody>
        </table>
      </div>
    </div>
  );
}

// ─── COTISATIONS ──────────────────────────────────────────────────────────────
function Cotisations({ tenants, payments, isAdmin, onAddPayment, onDeletePayment }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ tenantId:"", month:"", amount:1000, date:new Date().toISOString().split("T")[0], note:"" });
  const [view, setView] = useState("grid");
  const [filterTenant, setFilterTenant] = useState("all");

  // Mois uniques présents dans les paiements
  const allMonths = [...new Set(payments.map(p=>p.month))].filter(Boolean).sort();

  async function savePayment() {
    if (!form.tenantId || !form.amount || !form.month) return;
    await onAddPayment({ ...form, tenantId:Number(form.tenantId), amount:Number(form.amount) });
    setShowForm(false);
    setForm({ tenantId:"", month:"", amount:1000, date:new Date().toISOString().split("T")[0], note:"" });
  }

  const filteredTenants = filterTenant==="all" ? tenants : tenants.filter(t=>t.id===Number(filterTenant));

  // Calcul solde par locataire
  function getTenantData(ten) {
    const tenPay = payments.filter(p=>p.tenantId===ten.id);
    const totalPaid = tenPay.reduce((s,p)=>s+Number(p.amount),0) + Number(ten.priorCredit||0);
    return { tenPay, totalPaid };
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>💰 Cotisations</h2>
        <div style={{ display:"flex", gap:6, flexWrap:"wrap" }}>
          <button onClick={()=>setView(v=>v==="grid"?"history":"grid")} style={btnStyle()}>
            {view==="grid"?"📋 Historique":"📊 Grille"}
          </button>
          {isAdmin && <button onClick={()=>setShowForm(true)} style={btnStyle(C.accent,"#0f172a")}>+ Paiement</button>}
        </div>
      </div>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div>
              <label style={{ fontSize:11, color:C.sub }}>Locataire</label>
              <select style={inputStyle} value={form.tenantId} onChange={e=>setForm(f=>({...f,tenantId:e.target.value}))}>
                <option value="">— Choisir —</option>
                {tenants.map(ten=><option key={ten.id} value={ten.id}>{ten.apt} {ten.name}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:11, color:C.sub }}>Mois (ex: Juin 2026)</label>
              <input style={inputStyle} placeholder="ex: Juin 2026" value={form.month} onChange={e=>setForm(f=>({...f,month:e.target.value}))} />
            </div>
            <div><label style={{ fontSize:11, color:C.sub }}>Montant (DA)</label><input type="number" style={inputStyle} value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Date</label><input type="date" style={inputStyle} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></div>
            <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:11, color:C.sub }}>Note</label><input style={inputStyle} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={savePayment} style={btnStyle(C.green,"#fff")}>💾 Enregistrer</button>
            <button onClick={()=>setShowForm(false)} style={btnStyle()}>Annuler</button>
          </div>
        </div>
      )}

      <div style={{ marginBottom:10 }}>
        <select style={{ ...inputStyle, width:"auto" }} value={filterTenant} onChange={e=>setFilterTenant(e.target.value)}>
          <option value="all">Tous les locataires</option>
          {tenants.map(ten=><option key={ten.id} value={ten.id}>{ten.apt} {ten.name}</option>)}
        </select>
      </div>

      {view==="grid" ? (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ background:"#334155" }}>
                <th style={{ padding:"9px 10px", color:C.sub, textAlign:"left", borderBottom:`1px solid #475569`, minWidth:90 }}>Apt</th>
                {allMonths.map(m=>(
                  <th key={m} style={{ padding:"9px 8px", color:C.sub, textAlign:"center", borderBottom:`1px solid #475569`, minWidth:80, whiteSpace:"nowrap" }}>{m}</th>
                ))}
                <th style={{ padding:"9px 8px", color:C.sub, textAlign:"right", borderBottom:`1px solid #475569` }}>Total payé</th>
                <th style={{ padding:"9px 8px", color:C.sub, textAlign:"right", borderBottom:`1px solid #475569` }}>Statut</th>
              </tr>
            </thead>
            <tbody>
              {filteredTenants.map(ten=>{
                const { tenPay, totalPaid } = getTenantData(ten);
                const hasPaid = totalPaid > 0;
                return (
                  <tr key={ten.id} style={{ borderBottom:`1px solid #1e293b` }}>
                    <td style={{ padding:"8px 10px", fontWeight:700, color:C.accent, whiteSpace:"nowrap" }}>
                      {ten.apt}<br/><span style={{ fontSize:10, color:C.sub, fontWeight:400 }}>{ten.name}</span>
                    </td>
                    {allMonths.map(m=>{
                      const mp = tenPay.filter(p=>p.month===m);
                      const amt = mp.reduce((s,p)=>s+Number(p.amount),0);
                      return (
                        <td key={m} style={{ padding:"6px 6px", textAlign:"center" }}>
                          <div style={{ background:amt>0?"#14532d33":"#7f1d1d33", borderRadius:4, padding:"3px 4px" }}>
                            <span style={{ fontSize:11, fontWeight:700, color:amt>0?C.green:C.red }}>
                              {amt>0?`${amt.toLocaleString()}`:"✗"}
                            </span>
                          </div>
                        </td>
                      );
                    })}
                    <td style={{ padding:"8px 10px", textAlign:"right", fontWeight:700, color:C.green }}>{totalPaid.toLocaleString()} DA</td>
                    <td style={{ padding:"8px 10px", textAlign:"right" }}>
                      <span style={{ background:hasPaid?"#14532d33":"#7f1d1d33", color:hasPaid?C.green:C.red, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>
                        {hasPaid?"✅ Payé":"❌ Non payé"}
                      </span>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          {allMonths.length===0 && <p style={{ color:C.sub, textAlign:"center", padding:20 }}>Aucun paiement enregistré</p>}
        </div>
      ) : (
        <div>
          <h4 style={{ color:C.text, marginBottom:10 }}>📋 Historique des paiements</h4>
          {payments.length===0 ? <p style={{ color:C.sub }}>Aucun paiement</p> : (
            [...payments].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=>{
              const ten = tenants.find(t=>t.id===p.tenantId);
              return (
                <div key={p.id} style={{ ...cardStyle, display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8, padding:"10px 14px" }}>
                  <div>
                    <span style={{ fontWeight:700, color:C.text }}>{ten?.apt}</span>
                    <span style={{ color:C.sub, marginLeft:8, fontSize:12 }}>{ten?.name}</span>
                    <div style={{ fontSize:12, color:C.sub, marginTop:2 }}>{p.month} · {p.date}{p.note?` · ${p.note}`:""}</div>
                  </div>
                  <div style={{ display:"flex", alignItems:"center", gap:8 }}>
                    <span style={{ fontWeight:800, fontSize:15, color:C.green }}>+{Number(p.amount).toLocaleString()} DA</span>
                    {isAdmin && <button onClick={()=>onDeletePayment(p.id)} style={{ ...btnStyle("#7f1d1d","#fca5a5"), padding:"3px 8px", fontSize:11 }}>🗑️</button>}
                  </div>
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

// ─── DEPENSES ─────────────────────────────────────────────────────────────────
function Depenses({ depenses, isAdmin, onAdd, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ designation:"", amount:"", date:new Date().toISOString().split("T")[0], category:"Entretien", photo:null, note:"" });
  const [viewPhoto, setViewPhoto] = useState(null);
  const fileRef = useRef();
  const CATS = ["Entretien","Nettoyage","Électricité","Plomberie","Sécurité","Divers"];

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm(f=>({...f,photo:ev.target.result}));
    reader.readAsDataURL(file);
  }

  async function save() {
    if (!form.designation.trim() || !form.amount) return;
    await onAdd({...form, amount:Number(form.amount)});
    setShowForm(false);
    setForm({ designation:"", amount:"", date:new Date().toISOString().split("T")[0], category:"Entretien", photo:null, note:"" });
  }

  const total = depenses.reduce((s,d)=>s+Number(d.amount),0);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <div>
          <h2 style={{ margin:0, color:C.text }}>🛒 Dépenses</h2>
          <div style={{ color:C.amber, fontWeight:700, fontSize:14 }}>Total : {total.toLocaleString()} DA</div>
        </div>
        {isAdmin && <button onClick={()=>setShowForm(true)} style={btnStyle(C.accent,"#0f172a")}>+ Dépense</button>}
      </div>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:8, marginBottom:10 }}>
            <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:11, color:C.sub }}>Désignation</label><input style={inputStyle} value={form.designation} onChange={e=>setForm(f=>({...f,designation:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Montant (DA)</label><input type="number" style={inputStyle} value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Date</label><input type="date" style={inputStyle} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></div>
            <div>
              <label style={{ fontSize:11, color:C.sub }}>Catégorie</label>
              <select style={inputStyle} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {CATS.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:11, color:C.sub }}>Photo/Facture</label>
              <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handlePhoto} />
              <button onClick={()=>fileRef.current.click()} style={{ ...btnStyle(), width:"100%" }}>
                {form.photo?"✅ Photo ajoutée":"📷 Ajouter photo"}
              </button>
            </div>
            <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:11, color:C.sub }}>Note</label><input style={inputStyle} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={save} style={btnStyle(C.green,"#fff")}>💾 Enregistrer</button>
            <button onClick={()=>setShowForm(false)} style={btnStyle()}>Annuler</button>
          </div>
        </div>
      )}

      {viewPhoto && (
        <div onClick={()=>setViewPhoto(null)} style={{ position:"fixed", inset:0, background:"#000a", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <img src={viewPhoto} alt="facture" style={{ maxWidth:"90vw", maxHeight:"90vh", borderRadius:8 }} />
        </div>
      )}

      {depenses.map(d=>(
        <div key={d.id} style={{ ...cardStyle, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:10, flexWrap:"wrap" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, color:C.text }}>{d.designation}</div>
            <div style={{ fontSize:12, color:C.sub, marginTop:3 }}>
              <span style={{ background:"#334155", borderRadius:4, padding:"2px 8px", marginRight:6 }}>{d.category}</span>
              {d.date}{d.note?` · ${d.note}`:""}
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            {d.photo && <button onClick={()=>setViewPhoto(d.photo)} style={{ ...btnStyle(), color:C.accent, fontSize:12 }}>🧾 Facture</button>}
            <span style={{ fontWeight:800, color:C.amber }}>{Number(d.amount).toLocaleString()} DA</span>
            {isAdmin && <button onClick={()=>onDelete(d.id)} style={{ ...btnStyle("#7f1d1d","#fca5a5"), padding:"4px 8px", fontSize:11 }}>🗑️</button>}
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── VOTES ────────────────────────────────────────────────────────────────────
function Votes({ votes, isAdmin, onAdd, onClose, onCastVote, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ question:"", description:"", options:["Oui","Non"], deadline:"" });
  const [userVotes, setUserVotes] = useState({});

  async function saveVote() {
    if (!form.question.trim()) return;
    const initV = {};
    form.options.forEach((_,i)=>{ initV[i]=[]; });
    await onAdd({...form, votes:initV, closed:false});
    setShowForm(false);
    setForm({ question:"", description:"", options:["Oui","Non"], deadline:"" });
  }

  async function castVote(voteId, optIdx) {
    if (userVotes[voteId]!==undefined) return;
    setUserVotes(prev=>({...prev,[voteId]:optIdx}));
    await onCastVote(voteId, optIdx);
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>🗳️ Sondages</h2>
        {isAdmin && <button onClick={()=>setShowForm(true)} style={btnStyle(C.accent,"#0f172a")}>+ Créer</button>}
      </div>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gap:8, marginBottom:10 }}>
            <div><label style={{ fontSize:11, color:C.sub }}>Question</label><input style={inputStyle} value={form.question} onChange={e=>setForm(f=>({...f,question:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Description</label><input style={inputStyle} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} /></div>
            <div>
              <label style={{ fontSize:11, color:C.sub }}>Options</label>
              {form.options.map((opt,i)=>(
                <div key={i} style={{ display:"flex", gap:6, marginBottom:5 }}>
                  <input style={{ ...inputStyle, flex:1 }} value={opt} onChange={e=>setForm(f=>({...f,options:f.options.map((o,j)=>j===i?e.target.value:o)}))} />
                  {form.options.length>2 && <button onClick={()=>setForm(f=>({...f,options:f.options.filter((_,j)=>j!==i)}))} style={{ ...btnStyle("#7f1d1d","#fca5a5"), padding:"4px 8px" }}>✕</button>}
                </div>
              ))}
              <button onClick={()=>setForm(f=>({...f,options:[...f.options,""]}))} style={{ ...btnStyle(), fontSize:12 }}>+ Option</button>
            </div>
            <div><label style={{ fontSize:11, color:C.sub }}>Date limite</label><input type="date" style={inputStyle} value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={saveVote} style={btnStyle(C.green,"#fff")}>💾 Créer</button>
            <button onClick={()=>setShowForm(false)} style={btnStyle()}>Annuler</button>
          </div>
        </div>
      )}

      {votes.map(v=>{
        const totalV = Object.values(v.votes||{}).flat().length;
        const winnerIdx = Object.entries(v.votes||{}).sort((a,b)=>b[1].length-a[1].length)[0]?.[0];
        const winnerCount = v.votes?.[winnerIdx]?.length||0;
        const myVote = userVotes[v.id];

        return (
          <div key={v.id} style={{ ...cardStyle, borderLeft:`4px solid ${v.closed?"#475569":C.accent2}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8, marginBottom:10 }}>
              <div>
                <div style={{ fontWeight:700, fontSize:15, color:C.text }}>{v.question}</div>
                {v.description && <div style={{ color:C.sub, fontSize:12, marginTop:2 }}>{v.description}</div>}
                {v.deadline && <div style={{ color:C.sub, fontSize:11, marginTop:3 }}>📅 {v.deadline}</div>}
              </div>
              <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                <span style={{ background:v.closed?"#33415566":C.accent2+"22", color:v.closed?C.sub:C.accent2, border:`1px solid ${v.closed?"#47556944":C.accent2+"44"}`, borderRadius:20, padding:"2px 10px", fontSize:11, fontWeight:700 }}>
                  {v.closed?"Clôturé":"Ouvert"}
                </span>
                {isAdmin && !v.closed && <button onClick={()=>onClose(v.id)} style={{ ...btnStyle(), fontSize:11, padding:"3px 8px" }}>🔒 Clôturer</button>}
                {isAdmin && <button onClick={()=>onDelete(v.id)} style={{ ...btnStyle("#7f1d1d","#fca5a5"), fontSize:11, padding:"3px 8px" }}>🗑️</button>}
              </div>
            </div>

            {(v.options||[]).map((opt,i)=>{
              const count = (v.votes?.[i]||[]).length;
              const pct = totalV>0?Math.round((count/totalV)*100):0;
              return (
                <div key={i} style={{ marginBottom:8 }}>
                  <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, marginBottom:3 }}>
                    <span style={{ color:C.text }}>{opt}</span>
                    <span style={{ color:C.sub }}>{count} voix ({pct}%)</span>
                  </div>
                  <div style={{ background:"#334155", borderRadius:4, height:8 }}>
                    <div style={{ background:i===0?C.green:C.red, width:`${pct}%`, height:8, borderRadius:4, transition:"width .3s" }} />
                  </div>
                  {!v.closed && myVote===undefined && (
                    <button onClick={()=>castVote(v.id,i)} style={{ ...btnStyle(i===0?"#14532d":"#7f1d1d", i===0?C.green:"#fca5a5"), fontSize:11, padding:"3px 10px", marginTop:4 }}>
                      👆 Voter
                    </button>
                  )}
                  {myVote===i && <span style={{ fontSize:11, color:C.green, marginTop:3, display:"block" }}>✅ Voté</span>}
                </div>
              );
            })}

            {winnerCount>=19 && (
              <div style={{ background:winnerIdx==="0"?"#14532d33":"#7f1d1d33", border:`1px solid ${winnerIdx==="0"?C.green:C.red}44`, borderRadius:6, padding:"6px 10px", marginTop:6 }}>
                <span style={{ fontWeight:700, color:winnerIdx==="0"?C.green:C.red }}>
                  {winnerIdx==="0"?"✅ Approuvé":"❌ Rejeté"} · {winnerCount} voix
                </span>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── ANNONCES ─────────────────────────────────────────────────────────────────
function Annonces({ annonces, isAdmin, onAdd, onDelete }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", message:"", urgent:false, date:new Date().toISOString().split("T")[0] });

  async function save() {
    if (!form.title.trim() || !form.message.trim()) return;
    await onAdd({...form});
    setShowForm(false);
    setForm({ title:"", message:"", urgent:false, date:new Date().toISOString().split("T")[0] });
  }

  function share(ann) {
    const text = `📢 ANNONCE IMMEUBLE :\n*${ann.title}*\n${ann.message}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:12, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>📢 Annonces</h2>
        {isAdmin && <button onClick={()=>setShowForm(true)} style={btnStyle(C.accent,"#0f172a")}>+ Nouvelle</button>}
      </div>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gap:8, marginBottom:10 }}>
            <div><label style={{ fontSize:11, color:C.sub }}>Titre</label><input style={inputStyle} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} /></div>
            <div><label style={{ fontSize:11, color:C.sub }}>Message</label><textarea style={{ ...inputStyle, minHeight:80, resize:"vertical" }} value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} /></div>
            <label style={{ fontSize:13, color:C.text, display:"flex", alignItems:"center", gap:6, cursor:"pointer" }}>
              <input type="checkbox" checked={form.urgent} onChange={e=>setForm(f=>({...f,urgent:e.target.checked}))} />
              ⚡ Urgent
            </label>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={save} style={btnStyle(C.green,"#fff")}>📣 Publier</button>
            <button onClick={()=>setShowForm(false)} style={btnStyle()}>Annuler</button>
          </div>
        </div>
      )}

      {annonces.map(ann=>(
        <div key={ann.id} style={{ ...cardStyle, borderLeft:`4px solid ${ann.urgent?C.red:C.accent}`, background:ann.urgent?"#7f1d1d18":C.card }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8 }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, flexWrap:"wrap" }}>
                {ann.urgent && <span style={{ background:C.red, color:"#fff", borderRadius:4, padding:"1px 8px", fontSize:11, fontWeight:800 }}>⚡ URGENT</span>}
                <span style={{ fontWeight:700, fontSize:15, color:C.text }}>{ann.title}</span>
                <span style={{ color:C.sub, fontSize:11 }}>· {ann.date}</span>
              </div>
              <p style={{ color:"#cbd5e1", margin:0, fontSize:13, lineHeight:1.6 }}>{ann.message}</p>
            </div>
            <div style={{ display:"flex", gap:6, flexDirection:"column" }}>
              <button onClick={()=>share(ann)} style={{ ...btnStyle("#14532d",C.green), fontSize:12 }}>📲 WhatsApp</button>
              {isAdmin && <button onClick={()=>onDelete(ann.id)} style={{ ...btnStyle("#7f1d1d","#fca5a5"), fontSize:11 }}>🗑️ Supprimer</button>}
            </div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [isAdmin, setIsAdmin] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [tab, setTab] = useState("dashboard");
  const [loading, setLoading] = useState(true);

  const [tenants, setTenants] = useState([]);
  const [payments, setPayments] = useState([]);
  const [depenses, setDepenses] = useState([]);
  const [votes, setVotes] = useState([]);
  const [annonces, setAnnonces] = useState([]);

  useEffect(() => {
    loadDB().then(data => {
      if (data.tenants.length > 0) {
        setTenants(data.tenants); setPayments(data.payments);
        setDepenses(data.depenses); setVotes(data.votes); setAnnonces(data.annonces);
        setLoading(false);
      } else {
        const defaultTenants = initTenants();
        supabase.from("tenants").insert(defaultTenants).then(() => {
          loadDB().then(d2 => {
            setTenants(d2.tenants); setPayments(d2.payments);
            setDepenses(d2.depenses); setVotes(d2.votes); setAnnonces(d2.annonces);
            setLoading(false);
          });
        });
      }
    });
  }, []);

  function tryLogin() {
    if (ADMIN_PASSWORDS.includes(pwInput.trim())) {
      setIsAdmin(true); setShowLogin(false); setPwInput(""); setPwError(false);
    } else { setPwError(true); }
  }

  function doLogout() {
    setIsAdmin(false);
    if (["tenants","depenses"].includes(tab)) setTab("dashboard");
  }

  // ── Supabase actions ──
  async function addTenant(t) { const {data}=await supabase.from("tenants").insert([t]).select(); if(data) setTenants(p=>[...p,data[0]]); }
  async function updateTenant(id,u) { await supabase.from("tenants").update(u).eq("id",id); setTenants(p=>p.map(t=>t.id===id?{...t,...u}:t)); }
  async function deleteTenant(id) { await supabase.from("tenants").delete().eq("id",id); setTenants(p=>p.filter(t=>t.id!==id)); }

  async function addPayment(pay) { const {data}=await supabase.from("payments").insert([pay]).select(); if(data) setPayments(p=>[...p,data[0]]); }
  async function deletePayment(id) { await supabase.from("payments").delete().eq("id",id); setPayments(p=>p.filter(x=>x.id!==id)); }

  async function addDepense(d) { const {data}=await supabase.from("depenses").insert([d]).select(); if(data) setDepenses(p=>[data[0],...p]); }
  async function deleteDepense(id) { await supabase.from("depenses").delete().eq("id",id); setDepenses(p=>p.filter(x=>x.id!==id)); }

  async function addVote(v) { const {data}=await supabase.from("votes").insert([v]).select(); if(data) setVotes(p=>[data[0],...p]); }
  async function closeVote(id) { await supabase.from("votes").update({closed:true}).eq("id",id); setVotes(p=>p.map(v=>v.id===id?{...v,closed:true}:v)); }
  async function deleteVote(id) { await supabase.from("votes").delete().eq("id",id); setVotes(p=>p.filter(v=>v.id!==id)); }
  async function castVoteDB(voteId, optIdx) {
    const vote = votes.find(v=>v.id===voteId);
    if (!vote) return;
    const newV = {...vote.votes, [optIdx]:[...(vote.votes[optIdx]||[]),1]};
    await supabase.from("votes").update({votes:newV}).eq("id",voteId);
    setVotes(p=>p.map(v=>v.id===voteId?{...v,votes:newV}:v));
  }

  async function addAnnonce(a) { const {data}=await supabase.from("annonces").insert([a]).select(); if(data) setAnnonces(p=>[data[0],...p]); }
  async function deleteAnnonce(id) { await supabase.from("annonces").delete().eq("id",id); setAnnonces(p=>p.filter(x=>x.id!==id)); }

  // Solde caisse
  const totalPaid = payments.reduce((s,p)=>s+Number(p.amount),0) + tenants.reduce((s,t)=>s+Number(t.priorCredit||0),0);
  const totalSpent = depenses.reduce((s,d)=>s+Number(d.amount),0);
  const caisse = totalPaid - totalSpent;

  if (loading) return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", flexDirection:"column", gap:16 }}>
      <div style={{ fontSize:48 }}>🏢</div>
      <div style={{ color:C.accent, fontSize:18, fontWeight:700 }}>Chargement...</div>
      <div style={{ color:C.sub, fontSize:13 }}>Connexion à la base de données</div>
    </div>
  );

  if (showLogin) return (
    <div style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center" }}>
      <div style={{ ...cardStyle, width:320, textAlign:"center" }}>
        <div style={{ fontSize:40, marginBottom:8 }}>🔐</div>
        <h2 style={{ color:C.text, margin:"0 0 16px" }}>Connexion Admin</h2>
        <input type="password" placeholder="Mot de passe" value={pwInput}
          onChange={e=>{ setPwInput(e.target.value); setPwError(false); }}
          onKeyDown={e=>e.key==="Enter"&&tryLogin()}
          style={{ ...inputStyle, marginBottom:8, fontSize:15, outline:"none", borderColor:pwError?C.red:C.border }} />
        {pwError && <p style={{ color:C.red, margin:"0 0 8px", fontSize:13 }}>Mot de passe incorrect</p>}
        <button onClick={tryLogin} style={{ ...btnStyle(C.accent,"#0f172a"), width:"100%", padding:10, fontSize:15, marginBottom:8 }}>Se connecter</button>
        <button onClick={()=>setShowLogin(false)} style={{ background:"none", border:"none", color:C.sub, cursor:"pointer", fontSize:13 }}>← Retour</button>
      </div>
    </div>
  );

  const NAV = [
    { key:"dashboard", label:"Tableau de bord", icon:"📊" },
    { key:"cotisations", label:"Cotisations", icon:"💰" },
    { key:"votes", label:"Sondages", icon:"🗳️" },
    { key:"annonces", label:"Annonces", icon:"📢" },
    ...(isAdmin ? [
      { key:"tenants", label:"Locataires", icon:"👥" },
      { key:"depenses", label:"Dépenses", icon:"🛒" },
    ] : []),
  ];

  return (
    <div style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"system-ui, sans-serif", display:"flex", flexDirection:"column" }}>
      {/* HEADER */}
      <header style={{ background:C.card, borderBottom:`1px solid ${C.border}`, padding:"10px 16px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:10, flexWrap:"wrap" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:26 }}>🏢</span>
          <div>
            <div style={{ fontWeight:800, fontSize:16, color:C.accent }}>Gestion Immeuble</div>
            <div style={{ fontSize:11, color:C.sub }}>Caisse & Cotisations</div>
          </div>
        </div>
        {/* Solde caisse visible dans header */}
        <div style={{ background:caisse>=0?"#14532d33":"#7f1d1d33", border:`1px solid ${caisse>=0?C.green:C.red}44`, borderRadius:8, padding:"4px 12px", textAlign:"center" }}>
          <div style={{ fontSize:10, color:C.sub }}>💰 Solde caisse</div>
          <div style={{ fontWeight:800, color:caisse>=0?C.green:C.red, fontSize:14 }}>{caisse.toLocaleString()} DA</div>
        </div>
        <div style={{ display:"flex", gap:6, alignItems:"center", flexWrap:"wrap" }}>
          {isAdmin ? (
            <>
              <span style={{ background:C.accent+"22", color:C.accent, border:`1px solid ${C.accent}44`, borderRadius:20, padding:"3px 10px", fontSize:11, fontWeight:700 }}>⚙️ Admin</span>
              <button onClick={doLogout} style={{ ...btnStyle(), borderRadius:20, padding:"4px 12px" }}>Déconnexion</button>
            </>
          ) : (
            <>
              <span style={{ background:"#33415544", color:C.sub, borderRadius:20, padding:"3px 10px", fontSize:11 }}>👁 Consultation</span>
              <button onClick={()=>setShowLogin(true)} style={{ ...btnStyle(C.accent,"#0f172a"), borderRadius:20, padding:"4px 12px" }}>🔐 Admin</button>
            </>
          )}
        </div>
      </header>

      {/* NAV */}
      <nav style={{ background:C.card, borderBottom:`1px solid ${C.border}`, display:"flex", gap:2, padding:"6px 10px", overflowX:"auto" }}>
        {NAV.map(({key,label,icon})=>(
          <button key={key} onClick={()=>setTab(key)} style={{ background:tab===key?C.accent:"transparent", color:tab===key?"#0f172a":C.sub, border:"none", borderRadius:8, padding:"7px 12px", cursor:"pointer", fontWeight:tab===key?700:400, fontSize:12, whiteSpace:"nowrap", transition:"all .15s" }}>
            {icon} {label}
          </button>
        ))}
      </nav>

      {/* CONTENT */}
      <main style={{ flex:1, padding:14, maxWidth:900, width:"100%", margin:"0 auto", boxSizing:"border-box" }}>
        {tab==="dashboard"   && <Dashboard tenants={tenants} payments={payments} depenses={depenses} votes={votes} annonces={annonces} />}
        {tab==="tenants"     && <Tenants tenants={tenants} payments={payments} isAdmin={isAdmin} onAdd={addTenant} onUpdate={updateTenant} onDelete={deleteTenant} />}
        {tab==="cotisations" && <Cotisations tenants={tenants} payments={payments} isAdmin={isAdmin} onAddPayment={addPayment} onDeletePayment={deletePayment} />}
        {tab==="depenses"    && <Depenses depenses={depenses} isAdmin={isAdmin} onAdd={addDepense} onDelete={deleteDepense} />}
        {tab==="votes"       && <Votes votes={votes} isAdmin={isAdmin} onAdd={addVote} onClose={closeVote} onCastVote={castVoteDB} onDelete={deleteVote} />}
        {tab==="annonces"    && <Annonces annonces={annonces} isAdmin={isAdmin} onAdd={addAnnonce} onDelete={deleteAnnonce} />}
      </main>

      <footer style={{ textAlign:"center", color:C.sub, fontSize:11, padding:10, borderTop:`1px solid ${C.border}` }}>
        🏢 Gestion Immeuble · {tenants.length} locataires · 2026
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
