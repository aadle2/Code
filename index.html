// ─── LOCALSTORAGE HOOK ────────────────────────────────────────────────────────
function useLocalStorage(key, defaultValue) {
  const [value, setValue] = useState(() => {
    try {
      const stored = localStorage.getItem(key);
      return stored ? JSON.parse(stored) : defaultValue;
    } catch { return defaultValue; }
  });
  useEffect(() => {
    try { localStorage.setItem(key, JSON.stringify(value)); } catch {}
  }, [key, value]);
  return [value, setValue];
}

const initTenants = () => {
  const floors = [["RDC","0"],["1er","1"],["2ème","2"],["3ème","3"],["4ème","4"],["5ème","5"],["6ème","6"],["7ème","7"],["8ème","8"]];
  const tenants = [];
  let id = 1;
  for (let f = 0; f < floors.length; f++) {
    const count = f === 0 ? 5 : 4;
    for (let a = 1; a <= count; a++) {
      tenants.push({ id: id++, name:`Locataire ${id-1}`, firstname:"", phone:"", apt:`${floors[f][0]}-${String(a).padStart(2,"0")}`, floor:floors[f][1], priorCredit:0 });

  }
  return tenants.slice(0,37);
};

// ─── HELPERS ──────────────────────────────────────────────────────────────────
function getTenantBalance(tenantId, payments, tenants) {
  const tenant = tenants.find(t => t.id === tenantId);
  const prior = tenant?.priorCredit || 0;
  const total = payments.filter(p => p.tenantId === tenantId).reduce((s,p) => s+p.amount, 0);
  const due = MONTHS.length * 1000;
  return prior + total - due;
}

// ─── DASHBOARD ────────────────────────────────────────────────────────────────
function Dashboard({ t, tenants, payments, depenses, votes, annonces, C, cardStyle }) {
  const totalCollected = payments.reduce((s,p)=>s+p.amount,0) + tenants.reduce((s,tn)=>s+(tn.priorCredit||0),0);
  const totalDue = tenants.length * MONTHS.length * 1000;
  const totalSpent = depenses.reduce((s,d)=>s+d.amount,0);
  const balance = totalCollected - totalSpent;
  const openVotes = votes.filter(v=>!v.closed).length;
  const lastAnnonce = annonces[0];
  const paidCount = tenants.filter(ten =>
    MONTHS.every(m => payments.filter(p=>p.tenantId===ten.id&&p.month===m).reduce((s,p)=>s+p.amount,0) >= 1000)
  ).length;

  const stats = [
    { label:t.dashboard.totalCollected, value:`${totalCollected.toLocaleString()} DA`, color:C.green, icon:"💵" },
    { label:t.dashboard.totalDue, value:`${totalDue.toLocaleString()} DA`, color:C.accent, icon:"📋" },
    { label:t.dashboard.totalSpent, value:`${totalSpent.toLocaleString()} DA`, color:C.amber, icon:"🛒" },
    { label:t.dashboard.balance, value:`${balance.toLocaleString()} DA`, color:balance>=0?C.green:C.red, icon:"🏦" },
    { label:t.dashboard.paidTenants, value:`${paidCount} / ${tenants.length}`, color:C.green, icon:"✅" },
    { label:t.dashboard.pendingTenants, value:`${tenants.length - paidCount}`, color:C.amber, icon:"⏳" },
    { label:t.dashboard.activeVotes, value:`${openVotes}`, color:C.accent2, icon:"🗳️" },
  ];

  return (
    <div>
      <h2 style={{ color:C.text, marginTop:0 }}>📊 {t.dashboard.title}</h2>
      <div style={{ display:"grid", gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))", gap:12, marginBottom:20 }}>
        {stats.map((s,i)=>(
          <div key={i} style={{ ...cardStyle, margin:0, borderLeft:`4px solid ${s.color}` }}>
            <div style={{ fontSize:22, marginBottom:4 }}>{s.icon}</div>
            <div style={{ fontSize:20, fontWeight:800, color:s.color }}>{s.value}</div>
            <div style={{ fontSize:12, color:"#94a3b8", marginTop:2 }}>{s.label}</div>
          </div>
        ))}
      </div>

      {lastAnnonce && (
        <div style={{ ...cardStyle, borderLeft:`4px solid ${lastAnnonce.urgent?C.red:C.accent}`, background:lastAnnonce.urgent?"#7f1d1d22":C.card }}>
          <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6 }}>
            <span style={{ fontSize:18 }}>📢</span>
            <span style={{ fontWeight:700, color:C.text }}>{t.dashboard.recentAnnouncement}</span>
            {lastAnnonce.urgent && <span style={{ background:C.red, color:"#fff", borderRadius:4, padding:"1px 8px", fontSize:11, fontWeight:700 }}>{t.annonces.urgentBadge}</span>}
          </div>
          <div style={{ fontWeight:600, color:C.text }}>{lastAnnonce.title}</div>
          <div style={{ color:C.sub, fontSize:13, marginTop:4 }}>{lastAnnonce.message}</div>
        </div>
      )}

      <div style={cardStyle}>
        <div style={{ fontWeight:700, marginBottom:12, color:C.text }}>💰 {t.cotisations.title} — {t.cotisations.subtitle}</div>
        {MONTHS.map((m,i)=>{
          const collected = payments.filter(p=>p.month===m).reduce((s,p)=>s+p.amount,0);
          const target = tenants.length * 1000;
          const pct = Math.min(100, Math.round((collected/target)*100));
          return (
            <div key={m} style={{ marginBottom:8 }}>
              <div style={{ display:"flex", justifyContent:"space-between", fontSize:12, color:C.sub, marginBottom:3 }}>
                <span>{t.cotisations.months[i]}</span>
                <span>{collected.toLocaleString()} / {target.toLocaleString()} DA ({pct}%)</span>
              </div>
              <div style={{ background:"#334155", borderRadius:4, height:8 }}>
                <div style={{ background:pct>=100?C.green:pct>50?C.amber:C.red, width:`${pct}%`, height:8, borderRadius:4, transition:"width .3s" }} />
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

// ─── TENANTS ──────────────────────────────────────────────────────────────────
function Tenants({ t, tenants, setTenants, isAdmin, C, cardStyle }) {
  const [editing, setEditing] = useState(null);
  const [adding, setAdding] = useState(false);
  const [form, setForm] = useState({ name:"", firstname:"", phone:"", apt:"", floor:"0", priorCredit:0 });

  const inputStyle = { padding:"6px 10px", borderRadius:6, border:`1px solid #334155`, background:"#0f172a", color:"#f1f5f9", fontSize:13, width:"100%", boxSizing:"border-box" };
  const floors = ["RDC","1er","2ème","3ème","4ème","5ème","6ème","7ème","8ème"];

  function startAdd() { setForm({ name:"", firstname:"", phone:"", apt:"", floor:"0", priorCredit:0 }); setAdding(true); setEditing(null); }
  function startEdit(ten) { setForm({...ten}); setEditing(ten.id); setAdding(false); }
  function saveAdd() {
    if (!form.name.trim()) return;
    setTenants(prev=>[...prev, { ...form, id:Date.now(), priorCredit:Number(form.priorCredit)||0 }]);
    setAdding(false);
  }
  function saveEdit() {
    setTenants(prev=>prev.map(tn=>tn.id===editing?{...tn,...form,priorCredit:Number(form.priorCredit)||0}:tn));
    setEditing(null);
  }
  function del(id) { if(window.confirm(t.tenants.confirm_delete)) setTenants(prev=>prev.filter(tn=>tn.id!==id)); }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>👥 {t.tenants.title} ({tenants.length})</h2>
        {isAdmin && <button onClick={startAdd} style={{ background:C.accent, border:"none", color:"#0f172a", borderRadius:8, padding:"8px 16px", fontWeight:700, cursor:"pointer" }}>+ {t.tenants.add}</button>}
      </div>

      {(adding || editing) && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.tenants.name}</label><input style={inputStyle} value={form.name} onChange={e=>setForm(f=>({...f,name:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.tenants.firstname}</label><input style={inputStyle} value={form.firstname} onChange={e=>setForm(f=>({...f,firstname:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.tenants.phone}</label><input style={inputStyle} value={form.phone} onChange={e=>setForm(f=>({...f,phone:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.tenants.apt}</label><input style={inputStyle} value={form.apt} onChange={e=>setForm(f=>({...f,apt:e.target.value}))} /></div>
            <div>
              <label style={{ fontSize:12, color:C.sub }}>{t.tenants.floor}</label>
              <select style={inputStyle} value={form.floor} onChange={e=>setForm(f=>({...f,floor:e.target.value}))}>
                {floors.map((fl,i)=><option key={i} value={String(i)}>{fl}</option>)}
              </select>
            </div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.tenants.priorCredit} (DA)</label><input type="number" style={inputStyle} value={form.priorCredit} onChange={e=>setForm(f=>({...f,priorCredit:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={adding?saveAdd:saveEdit} style={{ background:C.green, border:"none", color:"#fff", borderRadius:6, padding:"7px 18px", fontWeight:700, cursor:"pointer" }}>{t.tenants.save}</button>
            <button onClick={()=>{setAdding(false);setEditing(null)}} style={{ background:"#334155", border:"none", color:C.text, borderRadius:6, padding:"7px 18px", cursor:"pointer" }}>{t.tenants.cancel}</button>
          </div>
        </div>
      )}

      <div style={{ overflowX:"auto" }}>
        <table style={{ width:"100%", borderCollapse:"collapse", fontSize:13 }}>
          <thead>
            <tr style={{ background:"#334155" }}>
              {[t.tenants.name, t.tenants.firstname, t.tenants.apt, t.tenants.floor, t.tenants.phone, t.tenants.priorCredit+" (DA)", isAdmin&&t.tenants.actions].filter(Boolean).map((h,i)=>(
                <th key={i} style={{ padding:"10px 12px", color:C.sub, fontWeight:600, textAlign:"left", borderBottom:`1px solid #475569`, whiteSpace:"nowrap" }}>{h}</th>
              ))}
            </tr>
          </thead>
          <tbody>
            {tenants.map(ten=>(
              <tr key={ten.id} style={{ borderBottom:`1px solid #1e293b` }}>
                <td style={{ padding:"9px 12px", color:C.text, fontWeight:600 }}>{ten.name}</td>
                <td style={{ padding:"9px 12px", color:C.sub }}>{ten.firstname}</td>
                <td style={{ padding:"9px 12px", color:C.accent }}>{ten.apt}</td>
                <td style={{ padding:"9px 12px", color:C.sub }}>{floors[Number(ten.floor)]||ten.floor}</td>
                <td style={{ padding:"9px 12px", color:C.sub }}>{ten.phone||"—"}</td>
                <td style={{ padding:"9px 12px", color:ten.priorCredit>0?C.green:C.sub }}>{ten.priorCredit>0?`+${Number(ten.priorCredit).toLocaleString()}`:0}</td>
                {isAdmin && <td style={{ padding:"9px 12px" }}>
                  <button onClick={()=>startEdit(ten)} style={{ background:"#334155", border:"none", color:C.text, borderRadius:4, padding:"3px 10px", cursor:"pointer", marginRight:4, fontSize:12 }}>✏️</button>
                  <button onClick={()=>del(ten.id)} style={{ background:"#7f1d1d", border:"none", color:"#fca5a5", borderRadius:4, padding:"3px 10px", cursor:"pointer", fontSize:12 }}>🗑️</button>
                </td>}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
    </div>
  );
}

              <label style={{ fontSize:12, color:C.sub }}>{t.cotisations.month}</label>

                {MONTHS_PRIOR.map((m,i)=><option key={"p"+i} value={m}>{t.months_full[i]} (antérieur)</option>)}
                {MONTHS.map((m,i)=><option key={m} value={m}>{t.cotisations.monthsFull[i]}</option>)}
              </select>
            </div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.cotisations.amount}</label><input type="number" style={inputStyle} value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.cotisations.date}</label><input type="date" style={inputStyle} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></div>
            <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:12, color:C.sub }}>{t.cotisations.note}</label><input style={inputStyle} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={savePayment} style={{ background:C.green, border:"none", color:"#fff", borderRadius:6, padding:"7px 18px", fontWeight:700, cursor:"pointer" }}>{t.cotisations.save}</button>
            <button onClick={()=>setShowForm(false)} style={{ background:"#334155", border:"none", color:C.text, borderRadius:6, padding:"7px 18px", cursor:"pointer" }}>{t.cotisations.cancel}</button>
          </div>
        </div>
      )}

      <div style={{ marginBottom:12 }}>
        <select style={{ padding:"7px 10px", borderRadius:6, border:`1px solid #334155`, background:"#1e293b", color:"#f1f5f9", fontSize:13 }} value={filter} onChange={e=>setFilter(e.target.value)}>
          <option value="all">{t.cotisations.allTenants}</option>
          {tenants.map(ten=><option key={ten.id} value={ten.id}>{ten.name} {ten.firstname} – {ten.apt}</option>)}
        </select>
      </div>

      {view==="grid" ? (
        <div style={{ overflowX:"auto" }}>
          <table style={{ width:"100%", borderCollapse:"collapse", fontSize:12 }}>
            <thead>
              <tr style={{ background:"#334155" }}>
                <th style={{ padding:"10px 10px", color:C.sub, textAlign:"left", borderBottom:`1px solid #475569`, minWidth:130 }}>{t.cotisations.tenant}</th>
                {MONTHS.map((m,i)=><th key={m} style={{ padding:"10px 8px", color:C.sub, textAlign:"center", borderBottom:`1px solid #475569`, minWidth:64 }}>{t.cotisations.months[i]}</th>)}
                <th style={{ padding:"10px 8px", color:C.sub, textAlign:"right", borderBottom:`1px solid #475569` }}>Total</th>
                <th style={{ padding:"10px 8px", color:C.sub, textAlign:"right", borderBottom:`1px solid #475569` }}>Solde</th>
              </tr>
            </thead>
            <tbody>
              {filteredTenants.map(ten=>{
                const tenPay = payments.filter(p=>p.tenantId===ten.id);
                const total = tenPay.reduce((s,p)=>s+p.amount,0) + (ten.priorCredit||0);
                const due = MONTHS.length*1000;
                const bal = total-due;
                return (
                  <tr key={ten.id} style={{ borderBottom:`1px solid #1e293b` }}>
                    <td style={{ padding:"8px 10px", color:C.text, fontWeight:600, whiteSpace:"nowrap" }}>{isAdmin ? `${ten.name} ${ten.firstname}` : ten.apt}<br/><span style={{ fontSize:11, color:C.accent, fontWeight:400 }}>{ten.apt}</span></td>
                    {MONTHS.map(m=>{
                      const mp = payments.filter(p=>p.tenantId===ten.id&&p.month===m);
                      const amt = mp.reduce((s,p)=>s+p.amount,0);
                      const status = amt>=1000?"paid":amt>0?"partial":"unpaid";
                      return (
                        <td key={m} style={{ padding:"8px 6px", textAlign:"center" }}>
                          <div style={{ background:status==="paid"?"#14532d33":status==="partial"?"#78350f33":"#7f1d1d33", borderRadius:4, padding:"3px 0" }}>
                            <div style={{ fontSize:11, fontWeight:700, color:status==="paid"?C.green:status==="partial"?C.amber:C.red }}>
                              {amt>0?amt.toLocaleString():"—"}
                            </div>
                          </div>
                        </td>
                      );
                    })}
                    <td style={{ padding:"8px 10px", textAlign:"right", color:C.text, fontWeight:700 }}>{total.toLocaleString()}</td>
                    <td style={{ padding:"8px 10px", textAlign:"right", fontWeight:700, color:bal>=0?C.green:C.red }}>{bal>=0?"+":""}{bal.toLocaleString()}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
      ) : (
        <div>
          <h4 style={{ color:C.text }}>📋 {t.cotisations.history}</h4>
          {payments.length===0 ? <p style={{ color:C.sub }}>Aucun paiement enregistré</p> : (
            [...payments].sort((a,b)=>new Date(b.date)-new Date(a.date)).map(p=>{
              const ten = tenants.find(tn=>tn.id===p.tenantId);
              return (
                <div key={p.id} style={{ ...cardStyle, margin:"0 0 8px", padding:"12px 16px", display:"flex", justifyContent:"space-between", alignItems:"center", flexWrap:"wrap", gap:8 }}>
                  <div>
                    <span style={{ fontWeight:700, color:C.text }}>{ten?.name} {ten?.firstname}</span>
                    <span style={{ color:C.accent, marginLeft:8, fontSize:12 }}>{ten?.apt}</span>
                    <div style={{ fontSize:12, color:C.sub, marginTop:2 }}>{p.month} · {p.date} {p.note&&`· ${p.note}`}</div>
                  </div>
                  <div style={{ fontWeight:800, fontSize:16, color:C.green }}>+{Number(p.amount).toLocaleString()} DA</div>
                </div>
              );
            })
          )}
        </div>
      )}
    </div>
  );
}

// ─── DEPENSES ─────────────────────────────────────────────────────────────────
function Depenses({ t, depenses, setDepenses, isAdmin, C, cardStyle }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ designation:"", amount:"", date:new Date().toISOString().split("T")[0], category:t.depenses.categories[0], photo:null, note:"" });
  const [viewPhoto, setViewPhoto] = useState(null);
  const fileRef = useRef();

  const inputStyle = { padding:"7px 10px", borderRadius:6, border:`1px solid #334155`, background:"#0f172a", color:"#f1f5f9", fontSize:13, width:"100%", boxSizing:"border-box" };

  function handlePhoto(e) {
    const file = e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = ev => setForm(f=>({...f, photo:ev.target.result}));
    reader.readAsDataURL(file);
  }

  function save() {
    if (!form.designation.trim() || !form.amount) return;
    setDepenses(prev=>[{ ...form, id:Date.now(), amount:Number(form.amount) }, ...prev]);
    setShowForm(false);
    setForm({ designation:"", amount:"", date:new Date().toISOString().split("T")[0], category:t.depenses.categories[0], photo:null, note:"" });
  }

  const total = depenses.reduce((s,d)=>s+d.amount,0);

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
        <div>
          <h2 style={{ margin:0, color:C.text }}>🛒 {t.depenses.title}</h2>
          <div style={{ color:C.amber, fontWeight:700, fontSize:14 }}>Total: {total.toLocaleString()} DA</div>
        </div>
        {isAdmin && <button onClick={()=>setShowForm(true)} style={{ background:C.accent, border:"none", color:"#0f172a", borderRadius:8, padding:"8px 16px", fontWeight:700, cursor:"pointer" }}>+ {t.depenses.add}</button>}
      </div>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gridTemplateColumns:"1fr 1fr", gap:10, marginBottom:10 }}>
            <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:12, color:C.sub }}>{t.depenses.designation}</label><input style={inputStyle} value={form.designation} onChange={e=>setForm(f=>({...f,designation:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.depenses.amount}</label><input type="number" style={inputStyle} value={form.amount} onChange={e=>setForm(f=>({...f,amount:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.depenses.date}</label><input type="date" style={inputStyle} value={form.date} onChange={e=>setForm(f=>({...f,date:e.target.value}))} /></div>
            <div>
              <label style={{ fontSize:12, color:C.sub }}>{t.depenses.category}</label>
              <select style={inputStyle} value={form.category} onChange={e=>setForm(f=>({...f,category:e.target.value}))}>
                {t.depenses.categories.map(c=><option key={c}>{c}</option>)}
              </select>
            </div>
            <div>
              <label style={{ fontSize:12, color:C.sub }}>{t.depenses.photo}</label>
              <input ref={fileRef} type="file" accept="image/*" style={{ display:"none" }} onChange={handlePhoto} />
              <button onClick={()=>fileRef.current.click()} style={{ background:"#334155", border:"none", color:C.text, borderRadius:6, padding:"7px 12px", cursor:"pointer", width:"100%", fontSize:13 }}>
                📷 {form.photo?"✅ Photo ajoutée":t.depenses.addPhoto}
              </button>
            </div>
            <div style={{ gridColumn:"1/-1" }}><label style={{ fontSize:12, color:C.sub }}>{t.depenses.note}</label><input style={inputStyle} value={form.note} onChange={e=>setForm(f=>({...f,note:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={save} style={{ background:C.green, border:"none", color:"#fff", borderRadius:6, padding:"7px 18px", fontWeight:700, cursor:"pointer" }}>{t.depenses.save}</button>
            <button onClick={()=>setShowForm(false)} style={{ background:"#334155", border:"none", color:C.text, borderRadius:6, padding:"7px 18px", cursor:"pointer" }}>{t.depenses.cancel}</button>
          </div>
        </div>
      )}

      {viewPhoto && (
        <div onClick={()=>setViewPhoto(null)} style={{ position:"fixed", inset:0, background:"#000a", zIndex:999, display:"flex", alignItems:"center", justifyContent:"center" }}>
          <img src={viewPhoto} alt="facture" style={{ maxWidth:"90vw", maxHeight:"90vh", borderRadius:8 }} />
        </div>
      )}

      {depenses.map(d=>(
        <div key={d.id} style={{ ...cardStyle, display:"flex", justifyContent:"space-between", alignItems:"flex-start", gap:12, flexWrap:"wrap" }}>
          <div style={{ flex:1 }}>
            <div style={{ fontWeight:700, color:C.text, fontSize:15 }}>{d.designation}</div>
            <div style={{ fontSize:12, color:C.sub, marginTop:3 }}>
              <span style={{ background:"#334155", borderRadius:4, padding:"2px 8px", marginRight:6 }}>{d.category}</span>
              {d.date}
              {d.note && <span style={{ marginLeft:8 }}>· {d.note}</span>}
            </div>
          </div>
          <div style={{ display:"flex", alignItems:"center", gap:8 }}>
            {d.photo && <button onClick={()=>setViewPhoto(d.photo)} style={{ background:"#334155", border:"none", color:C.accent, borderRadius:6, padding:"5px 10px", cursor:"pointer", fontSize:12 }}>🧾 {t.depenses.viewPhoto}</button>}
            <div style={{ fontWeight:800, fontSize:16, color:C.amber }}>{Number(d.amount).toLocaleString()} DA</div>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── VOTES ────────────────────────────────────────────────────────────────────
function Votes({ t, votes, setVotes, isAdmin, C, cardStyle }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ question:"", description:"", options:["Oui","Non"], deadline:"" });
  const [userVotes, setUserVotes] = useState({});

  const inputStyle = { padding:"7px 10px", borderRadius:6, border:`1px solid #334155`, background:"#0f172a", color:"#f1f5f9", fontSize:13, width:"100%", boxSizing:"border-box" };

  function saveVote() {
    if (!form.question.trim()) return;
    const newVote = { ...form, id:Date.now(), votes:{}, closed:false };
    form.options.forEach((_,i)=>{ newVote.votes[i]=[]; });
    setVotes(prev=>[newVote,...prev]);
    setShowForm(false);
    setForm({ question:"", description:"", options:["Oui","Non"], deadline:"" });
  }

  function castVote(voteId, optIdx) {
    if (userVotes[voteId]!==undefined) return;
    setUserVotes(prev=>({...prev,[voteId]:optIdx}));
    setVotes(prev=>prev.map(v=>v.id===voteId?{...v,votes:{...v.votes,[optIdx]:[...(v.votes[optIdx]||[]),1]}}:v));
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>🗳️ {t.votes.title}</h2>
        {isAdmin && <button onClick={()=>setShowForm(true)} style={{ background:C.accent, border:"none", color:"#0f172a", borderRadius:8, padding:"8px 16px", fontWeight:700, cursor:"pointer" }}>+ {t.votes.add}</button>}
      </div>
      <p style={{ color:C.sub, fontSize:13, marginTop:-8 }}>👥 {t.votes.majority} (37 locataires)</p>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gap:10, marginBottom:10 }}>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.votes.question}</label><input style={inputStyle} value={form.question} onChange={e=>setForm(f=>({...f,question:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.votes.description}</label><input style={inputStyle} value={form.description} onChange={e=>setForm(f=>({...f,description:e.target.value}))} /></div>
            <div>
              <label style={{ fontSize:12, color:C.sub }}>{t.votes.options}</label>
              {form.options.map((opt,i)=>(
                <div key={i} style={{ display:"flex", gap:6, marginBottom:5 }}>
                  <input style={{ ...inputStyle, flex:1 }} value={opt} onChange={e=>setForm(f=>({...f,options:f.options.map((o,j)=>j===i?e.target.value:o)}))} />
                  {form.options.length>2 && <button onClick={()=>setForm(f=>({...f,options:f.options.filter((_,j)=>j!==i)}))} style={{ background:"#7f1d1d", border:"none", color:"#fca5a5", borderRadius:4, padding:"4px 8px", cursor:"pointer" }}>✕</button>}
                </div>
              ))}
              <button onClick={()=>setForm(f=>({...f,options:[...f.options,""]}))} style={{ background:"#334155", border:"none", color:C.text, borderRadius:4, padding:"5px 12px", cursor:"pointer", fontSize:12 }}>+ {t.votes.addOption}</button>
            </div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.votes.deadline}</label><input type="date" style={inputStyle} value={form.deadline} onChange={e=>setForm(f=>({...f,deadline:e.target.value}))} /></div>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={saveVote} style={{ background:C.green, border:"none", color:"#fff", borderRadius:6, padding:"7px 18px", fontWeight:700, cursor:"pointer" }}>{t.votes.save}</button>
            <button onClick={()=>setShowForm(false)} style={{ background:"#334155", border:"none", color:C.text, borderRadius:6, padding:"7px 18px", cursor:"pointer" }}>{t.votes.cancel}</button>
          </div>
        </div>
      )}

      {votes.map(v=>{
        const totalVotes = Object.values(v.votes).flat().length;
        const maxVotes = Math.max(...Object.values(v.votes).map(arr=>arr.length),1);
        const winnerEntry = Object.entries(v.votes).sort((a,b)=>b[1].length-a[1].length)[0];
        const winnerIdx = winnerEntry?.[0];
        const winnerCount = v.votes[winnerIdx]?.length||0;
        const approved = winnerCount >= 19 && winnerIdx==="0";
        const myVote = userVotes[v.id];

        return (
          <div key={v.id} style={{ ...cardStyle, borderLeft:`4px solid ${v.closed?"#475569":C.accent2}` }}>
            <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8, marginBottom:8 }}>
              <div>
                <div style={{ fontWeight:700, fontSize:16, color:C.text }}>{v.question}</div>
                {v.description && <div style={{ color:C.sub, fontSize:13, marginTop:3 }}>{v.description}</div>}
                {v.deadline && <div style={{ color:C.sub, fontSize:12, marginTop:4 }}>📅 {v.deadline}</div>}
              </div>
              <div style={{ display:"flex", gap:6, alignItems:"center" }}>
                <span style={{ background:v.closed?"#33415566":C.accent2+"22", color:v.closed?C.sub:C.accent2, border:`1px solid ${v.closed?"#47556944":C.accent2+"44"}`, borderRadius:20, padding:"3px 10px", fontSize:12, fontWeight:700 }}>
                  {v.closed?t.votes.closed:t.votes.open}
                </span>
                {isAdmin && !v.closed && <button onClick={()=>setVotes(prev=>prev.map(vv=>vv.id===v.id?{...vv,closed:true}:vv))} style={{ background:"#334155", border:"none", color:C.sub, borderRadius:6, padding:"4px 10px", cursor:"pointer", fontSize:12 }}>{t.votes.close}</button>}
              </div>
            </div>

            <div style={{ marginBottom:8 }}>
              {v.options.map((opt,i)=>{
                const count = (v.votes[i]||[]).length;
                const pct = totalVotes>0?Math.round((count/totalVotes)*100):0;
                return (
                  <div key={i} style={{ marginBottom:8 }}>
                    <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:4 }}>
                      <span style={{ fontSize:13, color:C.text }}>{opt}</span>
                      <span style={{ fontSize:12, color:C.sub }}>{count} {t.votes.votes_count} ({pct}%)</span>
                    </div>
                    <div style={{ background:"#334155", borderRadius:4, height:8, position:"relative" }}>
                      <div style={{ background:i===0?C.green:C.red, width:`${pct}%`, height:8, borderRadius:4, transition:"width .3s" }} />
                    </div>
                    {!v.closed && myVote===undefined && (
                      <button onClick={()=>castVote(v.id,i)} style={{ background:i===0?"#14532d":"#7f1d1d", border:"none", color:i===0?C.green:"#fca5a5", borderRadius:4, padding:"4px 12px", cursor:"pointer", fontSize:12, marginTop:4 }}>
                        👆 {t.votes.vote}
                      </button>
                    )}
                    {myVote===i && <span style={{ fontSize:12, color:C.green, marginTop:4, display:"block" }}>✅ {t.votes.voted}</span>}
                  </div>
                );
              })}
            </div>

            {(v.closed || totalVotes>=19) && (
              <div style={{ background:approved?"#14532d33":"#7f1d1d33", border:`1px solid ${approved?C.green:C.red}44`, borderRadius:8, padding:"8px 12px", marginTop:8 }}>
                <span style={{ fontWeight:700, color:approved?C.green:C.red }}>{t.votes.winner}: {approved?t.votes.approved:t.votes.rejected}</span>
                <span style={{ color:C.sub, fontSize:12, marginLeft:8 }}>({winnerCount} {t.votes.votes_count})</span>
              </div>
            )}
          </div>
        );
      })}
    </div>
  );
}

// ─── ANNONCES ─────────────────────────────────────────────────────────────────
function Annonces({ t, annonces, setAnnonces, isAdmin, C, cardStyle }) {
  const [showForm, setShowForm] = useState(false);
  const [form, setForm] = useState({ title:"", message:"", urgent:false, date:new Date().toISOString().split("T")[0] });

  const inputStyle = { padding:"7px 10px", borderRadius:6, border:`1px solid #334155`, background:"#0f172a", color:"#f1f5f9", fontSize:13, width:"100%", boxSizing:"border-box" };

  function save() {
    if (!form.title.trim() || !form.message.trim()) return;
    setAnnonces(prev=>[{ ...form, id:Date.now() }, ...prev]);
    setShowForm(false);
    setForm({ title:"", message:"", urgent:false, date:new Date().toISOString().split("T")[0] });
  }

  function share(ann) {
    const text = `${t.annonces.shareMsg}*${ann.title}*\n${ann.message}\n\n🏢 ${t.appTitle}`;
    window.open(`https://wa.me/?text=${encodeURIComponent(text)}`, "_blank");
  }

  return (
    <div>
      <div style={{ display:"flex", justifyContent:"space-between", alignItems:"center", marginBottom:16, flexWrap:"wrap", gap:8 }}>
        <h2 style={{ margin:0, color:C.text }}>📢 {t.annonces.title}</h2>
        {isAdmin && <button onClick={()=>setShowForm(true)} style={{ background:C.accent, border:"none", color:"#0f172a", borderRadius:8, padding:"8px 16px", fontWeight:700, cursor:"pointer" }}>+ {t.annonces.add}</button>}
      </div>

      {showForm && (
        <div style={{ ...cardStyle, borderColor:C.accent }}>
          <div style={{ display:"grid", gap:10, marginBottom:10 }}>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.annonces.messageTitle}</label><input style={inputStyle} value={form.title} onChange={e=>setForm(f=>({...f,title:e.target.value}))} /></div>
            <div><label style={{ fontSize:12, color:C.sub }}>{t.annonces.message}</label><textarea style={{ ...inputStyle, minHeight:80, resize:"vertical" }} value={form.message} onChange={e=>setForm(f=>({...f,message:e.target.value}))} /></div>
            <label style={{ fontSize:13, color:C.text, display:"flex", alignItems:"center", gap:6, cursor:"pointer" }}>
              <input type="checkbox" checked={form.urgent} onChange={e=>setForm(f=>({...f,urgent:e.target.checked}))} />
              ⚡ {t.annonces.urgent}
            </label>
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button onClick={save} style={{ background:C.green, border:"none", color:"#fff", borderRadius:6, padding:"7px 18px", fontWeight:700, cursor:"pointer" }}>{t.annonces.save}</button>
            <button onClick={()=>setShowForm(false)} style={{ background:"#334155", border:"none", color:C.text, borderRadius:6, padding:"7px 18px", cursor:"pointer" }}>{t.annonces.cancel}</button>
          </div>
        </div>
      )}

      {annonces.map(ann=>(
        <div key={ann.id} style={{ ...cardStyle, borderLeft:`4px solid ${ann.urgent?C.red:C.accent}`, background:ann.urgent?"#7f1d1d18":C.card }}>
          <div style={{ display:"flex", justifyContent:"space-between", alignItems:"flex-start", flexWrap:"wrap", gap:8 }}>
            <div style={{ flex:1 }}>
              <div style={{ display:"flex", alignItems:"center", gap:8, marginBottom:6, flexWrap:"wrap" }}>
                {ann.urgent && <span style={{ background:C.red, color:"#fff", borderRadius:4, padding:"2px 8px", fontSize:11, fontWeight:800 }}>{t.annonces.urgentBadge}</span>}
                <span style={{ fontWeight:700, fontSize:16, color:C.text }}>{ann.title}</span>
                <span style={{ color:C.sub, fontSize:12 }}>· {ann.date}</span>
              </div>
              <p style={{ color:"#cbd5e1", margin:0, lineHeight:1.6 }}>{ann.message}</p>
            </div>
            <button onClick={()=>share(ann)} style={{ background:"#14532d", border:"none", color:C.green, borderRadius:8, padding:"8px 12px", cursor:"pointer", fontWeight:700, fontSize:12, whiteSpace:"nowrap" }}>
              📲 {t.annonces.share}
            </button>
          </div>
        </div>
      ))}
    </div>
  );
}

// ─── MAIN APP ─────────────────────────────────────────────────────────────────
function App() {
  const [lang, setLang] = useState("fr");
  const t = T[lang];
  const isRTL = lang === "ar";

  const [isAdmin, setIsAdmin] = useState(false);
  const [showLogin, setShowLogin] = useState(false);
  const [pwInput, setPwInput] = useState("");
  const [pwError, setPwError] = useState(false);
  const [tab, setTab] = useState("dashboard");

  const [tenants, setTenants] = useLocalStorage("imm_tenants", initTenants());
  const [payments, setPayments] = useLocalStorage("imm_payments", []);
  const [depenses, setDepenses] = useLocalStorage("imm_depenses", [
    { id:1, designation:"Ampoules hall + escaliers", amount:4500, date:"2026-03-15", category:"Électricité", photo:null, note:"" },
    { id:2, designation:"Produits nettoyage", amount:2000, date:"2026-02-10", category:"Nettoyage", photo:null, note:"" },
    { id:3, designation:"Réparation interphone", amount:8000, date:"2026-01-20", category:"Entretien", photo:null, note:"" },
  ]);
  const [votes, setVotes] = useLocalStorage("imm_votes", [
    { id:1, question:"Installer une caméra de surveillance à l'entrée", description:"Améliorer la sécurité de l'immeuble", options:["Oui, je suis pour","Non, je suis contre"], votes:{0:[],1:[]}, deadline:"2026-06-30", closed:false },
  ]);
  const [annonces, setAnnonces] = useLocalStorage("imm_annonces", SAMPLE_ANNOUNCEMENTS);

  function tryLogin() {
    if (ADMIN_PASSWORDS.includes(pwInput.trim())) {
      setIsAdmin(true); setShowLogin(false); setPwInput(""); setPwError(false);
    } else { setPwError(true); }
  }

  // Si on se déconnecte et qu'on est sur un onglet admin-only → retour dashboard
  function doLogout() {
    setIsAdmin(false);
    if (["tenants","depenses"].includes(tab)) setTab("dashboard");
  }

  const C = {
    bg:"#0f172a", card:"#1e293b", border:"#334155",
    accent:"#38bdf8", accent2:"#818cf8",
    text:"#f1f5f9", sub:"#94a3b8",
    green:"#22c55e", red:"#ef4444", amber:"#f59e0b",
  };

  const cardStyle = { background:C.card, border:`1px solid ${C.border}`, borderRadius:12, padding:20, marginBottom:16 };

  if (showLogin) return (
    <div dir={isRTL?"rtl":"ltr"} style={{ minHeight:"100vh", background:C.bg, display:"flex", alignItems:"center", justifyContent:"center", fontFamily:"system-ui, sans-serif" }}>
      <div style={{ ...cardStyle, width:340, textAlign:"center" }}>
        <div style={{ fontSize:40, marginBottom:8 }}>🔐</div>
        <h2 style={{ color:C.text, margin:"0 0 20px" }}>{t.login}</h2>
        <input type="password" placeholder={t.password} value={pwInput}
          onChange={e=>{ setPwInput(e.target.value); setPwError(false); }}
          onKeyDown={e=>e.key==="Enter"&&tryLogin()}
          style={{ width:"100%", padding:10, borderRadius:8, border:`1px solid ${pwError?C.red:C.border}`, background:"#0f172a", color:C.text, fontSize:15, boxSizing:"border-box", marginBottom:8, outline:"none" }} />
        {pwError && <p style={{ color:C.red, margin:"0 0 8px", fontSize:13 }}>{t.wrongPassword}</p>}
        <button onClick={tryLogin} style={{ width:"100%", padding:10, background:C.accent, color:"#0f172a", border:"none", borderRadius:8, fontWeight:700, fontSize:15, cursor:"pointer", marginBottom:10 }}>{t.loginBtn}</button>
        <button onClick={()=>setShowLogin(false)} style={{ background:"none", border:"none", color:C.sub, cursor:"pointer", fontSize:13 }}>← {t.nav.dashboard}</button>
        <p style={{ color:C.sub, fontSize:11, marginTop:12 }}>Mots de passe : admin123 / admin456 / admin789</p>
      </div>
    </div>
  );

  return (
    <div dir={isRTL?"rtl":"ltr"} style={{ minHeight:"100vh", background:C.bg, color:C.text, fontFamily:"system-ui, sans-serif", display:"flex", flexDirection:"column" }}>
      {/* HEADER */}
      <header style={{ background:C.card, borderBottom:`1px solid ${C.border}`, padding:"12px 20px", display:"flex", alignItems:"center", justifyContent:"space-between", gap:12, flexWrap:"wrap" }}>
        <div style={{ display:"flex", alignItems:"center", gap:10 }}>
          <span style={{ fontSize:28 }}>🏢</span>
          <div>
            <div style={{ fontWeight:800, fontSize:18, color:C.accent }}>{t.appTitle}</div>
            <div style={{ fontSize:12, color:C.sub }}>{t.appSubtitle}</div>
          </div>
        </div>
        <div style={{ display:"flex", gap:8, alignItems:"center", flexWrap:"wrap" }}>
          <button onClick={()=>setLang(lang==="fr"?"ar":"fr")} style={{ background:"#334155", border:"none", color:C.text, borderRadius:20, padding:"4px 14px", cursor:"pointer", fontWeight:700, fontSize:13 }}>
            {lang==="fr"?"🇩🇿 عربية":"🇫🇷 Français"}
          </button>
          {isAdmin ? (
            <>
              <span style={{ background:C.accent+"22", color:C.accent, border:`1px solid ${C.accent}44`, borderRadius:20, padding:"4px 12px", fontSize:12, fontWeight:700 }}>⚙️ {t.adminMode}</span>
              <button onClick={doLogout} style={{ background:"#334155", border:"none", color:C.text, borderRadius:20, padding:"4px 14px", cursor:"pointer", fontSize:13 }}>{t.logout}</button>
            </>
          ) : (
            <>
              <span style={{ background:"#33415544", color:C.sub, borderRadius:20, padding:"4px 12px", fontSize:12 }}>👁 {t.viewMode}</span>
              <button onClick={()=>setShowLogin(true)} style={{ background:C.accent, border:"none", color:"#0f172a", borderRadius:20, padding:"4px 14px", cursor:"pointer", fontWeight:700, fontSize:13 }}>🔐 Admin</button>
            </>
          )}
        </div>
      </header>

      {/* NAV */}
      <nav style={{ background:C.card, borderBottom:`1px solid ${C.border}`, display:"flex", gap:4, padding:"6px 12px", overflowX:"auto" }}>
        {Object.entries(t.nav).map(([key,label])=>{
          const adminOnly = ["tenants","depenses"];
          if (!isAdmin && adminOnly.includes(key)) return null;
          return (
            <button key={key} onClick={()=>setTab(key)} style={{ background:tab===key?C.accent:"transparent", color:tab===key?"#0f172a":C.sub, border:"none", borderRadius:8, padding:"7px 14px", cursor:"pointer", fontWeight:tab===key?700:400, fontSize:13, whiteSpace:"nowrap", transition:"all .15s" }}>
              {{"dashboard":"📊","tenants":"👥","cotisations":"💰","depenses":"🛒","votes":"🗳️","annonces":"📢"}[key]} {label}
            </button>
          );
        })}
      </nav>

      {/* CONTENT */}
      <main style={{ flex:1, padding:16, maxWidth:900, width:"100%", margin:"0 auto", boxSizing:"border-box" }}>
        {tab==="dashboard"    && <Dashboard t={t} tenants={tenants} payments={payments} depenses={depenses} votes={votes} annonces={annonces} C={C} cardStyle={cardStyle} />}
        {tab==="tenants"      && <Tenants t={t} tenants={tenants} setTenants={setTenants} isAdmin={isAdmin} C={C} cardStyle={cardStyle} />}
        {tab==="cotisations"  && <Cotisations t={t} tenants={tenants} payments={payments} setPayments={setPayments} isAdmin={isAdmin} C={C} cardStyle={cardStyle} />}
        {tab==="depenses"     && <Depenses t={t} depenses={depenses} setDepenses={setDepenses} isAdmin={isAdmin} C={C} cardStyle={cardStyle} />}
        {tab==="votes"        && <Votes t={t} votes={votes} setVotes={setVotes} isAdmin={isAdmin} C={C} cardStyle={cardStyle} />}
        {tab==="annonces"     && <Annonces t={t} annonces={annonces} setAnnonces={setAnnonces} isAdmin={isAdmin} C={C} cardStyle={cardStyle} lang={lang} />}
      </main>

      <footer style={{ textAlign:"center", color:C.sub, fontSize:11, padding:"12px", borderTop:`1px solid ${C.border}` }}>
        🏢 {t.appTitle} · 37 {t.tenants?.title} · 2026
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
